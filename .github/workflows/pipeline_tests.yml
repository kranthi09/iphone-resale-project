name: iPhone Resale Pipeline Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      CI: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          pip install pyspark pandas pytest pytest-html flask playwright

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Prepare folders
        run: |
          mkdir -p data/cleaned_iphone_listings
          mkdir -p reports

      - name: Run pipeline tests
        run: |
          pytest tests/test_1_pipeline.py -v --tb=short

      - name: Start Flask dashboard
        run: |
          python dashboard/app.py &
          sleep 5

      - name: Run dashboard tests
        run: |
          pytest tests/test_2_dashboard.py -v --tb=short --html=reports/test_report.html --self-contained-html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test_report.html